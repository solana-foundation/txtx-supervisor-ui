name: Release Supervisor UI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }} @ ${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and Release Supervisor UI
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Read package version
        id: package_version
        run: |
          echo "version=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("package.json", "utf8")).version)')" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          PACKAGE_VERSION: ${{ steps.package_version.outputs.version }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [[ "${TAG_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "::error::Tag ${TAG_NAME} does not match package.json version ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package dist
        run: tar -C dist -zcvf txtx-supervisor-ui-dist.tar.gz .

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: txtx-supervisor-ui-dist.tar.gz
          name: ${{ github.ref_name }}
