name: Node.js CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4      
        
      - name: Build .env file
        run: |
          touch .env
          echo HANKO_API_URL=${{ secrets.HANKO_API_URL }} >> .env
          cat .env

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - run: npm ci
      - run: npm run build

      - name: Compress Build
        run: tar -zcvf txtx-web-ui.tar.gz dist

      - name: Upload Build
        uses: actions/upload-artifact@v2
        with:
          name: txtx-web-ui.tar.gz
          path: txtx-web-ui.tar.gz
